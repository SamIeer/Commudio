version: "3.9"

services:
  db:
    image: postgres:15
    container_name: commudio_db
    restart: always
    env_file:
      - ./app/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: commudio_app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - ./app/.env

  frontend:
    build:
      context: ./commudio-frontend
      dockerfile: Dockerfile
    container_name: commudio_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./commudio-frontend:/app
      - /app/node_modules
    command: npm run dev -- --host
    depends_on:
      - app

volumes:
  postgres_data: